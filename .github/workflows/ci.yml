name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    name: Build & Typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API
        run: pnpm --filter @ai-sales/api build

      - name: Build Widget
        run: pnpm --filter @ai-sales/widget build

      - name: Build Dashboard
        run: pnpm --filter @ai-sales/dashboard build

      - name: Check for uncommitted source changes
        run: |
          git diff --exit-code apps/ packages/ || (
            echo "❌ コミットされていない変更があります:"
            git diff --name-only apps/ packages/
            echo "git add してからpushしてください。"
            exit 1
          )
